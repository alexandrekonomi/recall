services:
  postgres:
    image: postgres:15-alpine
    container_name: clinica_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinica_user
      POSTGRES_PASSWORD: clinica_pass
      POSTGRES_DB: clinica_reativacao
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    volumes:
      - clinica_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_user -d clinica_reativacao"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clinica_data:
    driver: local